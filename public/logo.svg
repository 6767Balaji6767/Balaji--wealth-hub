<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5d17a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a4e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a84c" />
      <stop offset="100%" style="stop-color:#f5d17a" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="100" rx="16" fill="url(#bgGrad)"/>

  <!-- Border -->
  <rect width="300" height="100" rx="16" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.6"/>

  <!-- Icon: Crown -->
  <g transform="translate(20, 22)">
    <!-- Crown base -->
    <rect x="0" y="32" width="50" height="8" rx="3" fill="url(#iconGrad)"/>
    <!-- Crown points -->
    <polygon points="5,32 5,10 18,22 25,4 32,22 45,10 45,32" fill="url(#iconGrad)"/>
    <!-- Crown gems -->
    <circle cx="25" cy="6" r="3" fill="#fff" opacity="0.9"/>
    <circle cx="7" cy="12" r="2" fill="#fff" opacity="0.7"/>
    <circle cx="43" cy="12" r="2" fill="#fff" opacity="0.7"/>
  </g>

  <!-- Divider line -->
  <line x1="85" y1="25" x2="85" y2="75" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

  <!-- WEALTH text -->
  <text x="100" y="52" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="url(#goldGrad)" letter-spacing="4">WEALTH</text>

  <!-- HUB text -->
  <text x="101" y="72" font-family="Georgia, serif" font-size="14" fill="#a0a0c0" letter-spacing="10">H U B</text>

  <!-- Tagline -->
  <text x="100" y="88" font-family="Georgia, serif" font-size="7" fill="#c9a84c" letter-spacing="3" opacity="0.7">FINANCIAL OS</text>
</svg>
